<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            align-items : center;
            justify-content: center;
            height: 100vh;
            background-color: white;
        }
        .container {
            display: inline-block;
            align-items : center;
            justify-content: center;
            background-color: white;
            border-color: black;
            border-width: 1px;
            border-style: solid;
            width: 461px;
            height: 700px;
        }
        h6,p {
            color: #858282;
        }
        h3,p,h6{
            padding-right: 15px;
            padding-left: 15px;
            padding-bottom: 0;
            padding-top: 0;
        }
        .pic {
            display: flex;
            border: none;
            width: 461px;
            height: 473px;
        }
        .pict {
            width: 461px;
            height: 473px;
            object-fit: cover;
            
        }
        button {
            text-align: right;
            border-color: black;
            border-width: 2px;
            border-radius: 5px;
            padding: 2px 5px;
            background-color: white;
            color: blue;
            margin-left: 15px;
        }

        
    </style>
</head>
<body>
    <div class="container">
        <div class="pic">
            <img src="2.jpg" alt="preview" class="pict" />
        </div>
        <div class="text">
            <h6>SUBSCRIBE TO ANY PLAN</h6>
            <h3>Get more features in Google Photos</h3>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eius, dignissimos placeat modi reiciendis quam beatae corrupti tenetur voluptatibus assumenda ut unde magni totam, rem adipisci eum vel itaque nostrum incidunt!</p>
            <button>View details</button>
        </div>
    </div>
    
    
</body>
</html>
