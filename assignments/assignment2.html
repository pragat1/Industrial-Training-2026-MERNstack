<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            align-items : center;
            justify-content: center;
            height: 100vh;
            background-color: white;
        }
        .container {
            display: inline-block;
            align-items : center;
            justify-content: center;
            background-color: white;
            /* padding: 20px; */
            border-color: black;
            border-width: 1px;
            border-style: solid;
        }
        h1 {
            margin: 0;
        }
        p {
            margin: 20px 0;
        }
        div.profiles {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border: none;
        }
        .profile-pic {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 1rem;
            
        }
        div.see {
            border: none;
            margin-bottom: 20px;
        }
        button {
            text-align: right;
            border-color: black;
            border:none;
            background-color: white;
            color: blue;
        }

        h1,p,.profiles,.see{
            margin-left: 20px;
            margin-right: 20px;
            margin-top: 20px;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Your profiles</h1>
        <p>See how different profiles appear in google services</p>
        <div class="profiles">
            <img src="2.jpg" alt="My Profile Picture" class="profile-pic" />
            <img src="2.jpg" alt="My Profile Picture" class="profile-pic" />
        </div>
        <hr>
        <div class="see">
            <button>See profiles</button>
        </div>
    </div>
    
    
</body>
</html>
