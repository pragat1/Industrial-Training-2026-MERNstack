        //18. Create a list of names and a search input box. As the user types, filter the list items that match the search text.
        let names = ["riya", "pragati", "chahat", "charu", "ridhima"];
        let search = document.getElementById("search");
        let container = document.querySelector(".container")

        search.addEventListener("keydown", (event) => {
            let inpValue = search.value.toLowerCase();
            if(inpValue == ""){
                container.innerHTML = ""
            }
            container.innerHTML = ""
            let listt = [];
            for (let i of names) {
                if (i.includes(inpValue)) {
                    listt.push(i)
                }
            }
            listt.forEach((l) => {
                let p = document.createElement("p")
                p.innerText = l
                container.appendChild(p)
            })
        });
